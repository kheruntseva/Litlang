services:
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    env_file: ./server/.env
    ports:
      - "3000:3000"
    volumes:
      - ./server/src:/app/src
      - ./server/knexfile.js:/app/knexfile.js
    command: npm run dev
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: litlang
      POSTGRES_USER: ${DB_USER:-litlang_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-litlang_pass}
    ports:
      - "5432:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-litlang_user} -d litlang"]
      interval: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata_dev:
