services:
  nginx:
    image: nginx:alpine
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl
      - ./client/dist:/usr/share/nginx/html:ro
    depends_on:
      - api
    restart: unless-stopped

  api:
    build:
      context: ./server
      pull: false
    env_file: ./server/.env
    expose:
      - "3000"
    volumes:
      - ./server/src:/app/src
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: litlang
      POSTGRES_USER: ${DB_USER:-litlang_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-litlang_pass}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-litlang_user} -d litlang"]
      interval: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
